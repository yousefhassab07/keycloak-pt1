<div>
  <h2>Lista della Spesa</h2>
  <!-- aggiunta: solo user_plus -->
  @if (authService.hasRole('user_plus')) {
  <div>
  <input
  [ngModel]="newItem()"
  (ngModelChange)="newItem.set($event)"
  placeholder="Nuovo elemento..."
  />
  <button (click)="addItem()">Aggiungi</button>
  </div>
  }
  <!-- lista visibile a tutti -->
  <ul>
  @for (item of items(); track item.id) {
  <li>
  {{ item.nome }}
  <!-- elimina: solo user_plus -->
  @if (authService.hasRole('user_plus')) {
  <button (click)="deleteItem(item.id)">elimina</button>
  }
  </li>
  }
  </ul>
  @if (items().length === 0) {
  <p>Nessun elemento in lista.</p>
  }

  @if (error()) {
  <p>{{ error() }}</p>
  }
</div>
